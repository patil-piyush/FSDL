<!-- 1. Develop a Digital Glossary that displays HTML formatting tags in a table
and allows users to filter the content dynamically using a search bar. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tags Glossary</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>HTML Tags</h1>

    <input type="text" placeholder="Search tags" id="searchbar" oninput="filterTable()">

    <table id="table">
        <thead class="th">
            <tr>
                <th>Tag</th>
                <th>description</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>&lt;a&gt;</td>
                <td>anchor tag</td>
            </tr>
            <tr>
                <td>&lt;body&gt;</td>
                <td>contains all the main text</td>
            </tr>
            <tr>
                <td>&lt;br&gt;</td>
                <td>takes cursor to new line</td>
            </tr>
            <tr>
                <td>&lt;table&gt;</td>
                <td>creates table section</td>
            </tr>
        </tbody>
    </table>

    <script>
        function filterTable(){
            let input = document.getElementById("searchbar").value.toLowerCase();
            let rows = document.querySelectorAll("#table tbody tr");

            rows.forEach(row => {
                let text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? "": "none";
            });
        }

    </script>
</body>

</html>
