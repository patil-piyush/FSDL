<!-- 4. Develop a Real-Time Profile Previewer where user input in a form is instantly reflected in a
profile card layout. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Previewer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>

<h2>Profile Previewer</h2>

<!-- Form -->
<div class="form">
    <input type="text" id="name" placeholder="Enter Name"><br><br>
    <input type="text" id="email" placeholder="Enter Email"><br><br>
    <textarea id="bio" placeholder="Enter Bio"></textarea>
</div>

<!-- Profile Card -->
<div class="card">
    <h3 id="pname">Your Name</h3>
    <p id="pemail">your@email.com</p>
    <p id="pbio">Your bio will appear here...</p>
</div>

</body>
</html>
