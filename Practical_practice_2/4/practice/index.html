<!-- 4. Develop a Real-Time Profile Previewer where user input in a form is instantly reflected in a
profile card layout. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card previewer</title>
</head>
<body>
    
    <div class="form">
        <input type="text" name="name" id="name">
        <input type="text" name="email" id="email">
        <textarea name="bio" id="bio"></textarea>
    </div>

    <div>
        <p id="pname">your name</p>
        <p id="pemail">your email</p>
        <p id="pbio">your bio</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
