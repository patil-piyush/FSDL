<!-- 3. Create a Pricing Toggle Interface that switches between Monthly and Yearly subscription
plans and updates prices dynamically. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pricing Toggle</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>

<h2>Pricing Plans</h2>

<!-- Simple Toggle -->
<label>
    <input type="checkbox" id="toggle">
    Yearly
</label>

<!-- Pricing Table -->
<div class="card">
    <h3>Basic</h3>
    <p class="price" data-month="10" data-year="100">$10</p>
    <p class="duration">/month</p>
</div>

<div class="card">
    <h3>Standard</h3>
    <p class="price" data-month="20" data-year="200">$20</p>
    <p class="duration">/month</p>
</div>

<div class="card">
    <h3>Premium</h3>
    <p class="price" data-month="30" data-year="300">$30</p>
    <p class="duration">/month</p>
</div>

</body>
</html>
