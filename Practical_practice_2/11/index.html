<!-- 11. Create a Shopping Cart System where users can increase/decrease product quantity and the
total price updates automatically. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>

<h2>Shopping Cart</h2>

<div class="cart">

    <div class="item">
        <span>Phone</span>
        <span class="price" data-price="10000">₹10000</span>

        <button class="minus">-</button>
        <span class="qty">1</span>
        <button class="plus">+</button>
    </div>

    <div class="item">
        <span>Laptop</span>
        <span class="price" data-price="50000">₹50000</span>

        <button class="minus">-</button>
        <span class="qty">1</span>
        <button class="plus">+</button>
    </div>

</div>

<h3>Total: ₹<span id="total">60000</span></h3>

</body>
</html>
