<!-- 14. Write a program that accepts a string input and performs operations such as reversing,
converting to uppercase/lowercase, and calculating its length. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>String Operations</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>

<h2>String Operations</h2>

<input type="text" id="inputText" placeholder="Enter text">

<br><br>

<button onclick="reverseText()">Reverse</button>
<button onclick="toUpper()">UPPERCASE</button>
<button onclick="toLower()">lowercase</button>
<button onclick="getLength()">Length</button>

<p id="result"></p>

</body>
</html>
